# =============================================================================
# Deploy QA (Frontend)
# Se ejecuta en: push a rama 'qa' (via PR desde develop)
# Hace:
#   1. Build + push de la imagen Docker del frontend al DOCR
#   2. terraform apply -var-file=environments/qa.tfvars
#      (crea/actualiza namespace + secrets K8s + DNS)
#   3. kustomize apply overlays/qa
# =============================================================================
name: Deploy QA

on:
  push:
    branches: [qa]

concurrency:
  group: deploy-qa
  cancel-in-progress: false  # Nunca cancelar un deploy en curso

env:
  NODE_VERSION: "22"
  ENVIRONMENT: qa
  REGISTRY: registry.digitalocean.com/criptojackpot
  TF_DIR: infrastructure/terraform
  K8S_NAMESPACE: criptojackpot
  NEXT_PUBLIC_API_BASE_URL: https://api-qa.criptojackpot.com

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push — construye y publica la imagen del frontend con tag :qa-{sha}
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=qa-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Building with tag: qa-${SHORT_SHA}"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/cryptojackpot-app:qa
            ${{ env.REGISTRY }}/cryptojackpot-app:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/cryptojackpot-app:qa
          cache-to: type=inline

  # ---------------------------------------------------------------------------
  # Terraform + Deploy — actualiza infra QA y despliega manifiestos K8s
  # ---------------------------------------------------------------------------
  terraform-deploy:
    name: Terraform Deploy QA
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: qa

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials for DO Spaces backend
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }}" >> $GITHUB_ENV

      - name: Terraform Init (QA state)
        run: |
          terraform init \
            -backend-config="key=frontend-qa/terraform.tfstate" \
            -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/qa.tfvars" \
            -out=tfplan-qa \
            -input=false \
            -lock=true \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt

          # Bloquear si el plan va a destruir recursos críticos
          if grep -E "must be replaced|will be destroyed|forces replacement" plan-output.txt | \
             grep -E "digitalocean_kubernetes_cluster|digitalocean_vpc|digitalocean_spaces_bucket"; then
            echo "ERROR: El plan destruiria recursos criticos de infraestructura."
            exit 1
          fi
        env:
          TF_VAR_do_token:             ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id:   ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_google_client_id:     ${{ secrets.QA_GOOGLE_CLIENT_ID }}
        continue-on-error: true  # exitcode=2 significa cambios (es OK)

      - name: Terraform Apply
        if: steps.plan.outcome != 'failure'
        run: |
          terraform apply -auto-approve tfplan-qa
        env:
          TF_VAR_do_token:             ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id:   ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_google_client_id:     ${{ secrets.QA_GOOGLE_CLIENT_ID }}

      - name: Connect kubectl to QA cluster
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          doctl kubernetes cluster kubeconfig save "$CLUSTER_ID" \
            --context criptojackpot-qa

      - name: Update image tag in QA overlay
        run: |
          cd ${{ github.workspace }}
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"

          cd infrastructure/k8s/overlays/qa
          kustomize edit set image \
            cryptojackpot/cryptojackpot-app=${REGISTRY}/cryptojackpot-app:${TAG}

      - name: Commit updated image tag to qa branch
        run: |
          cd ${{ github.workspace }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/k8s/overlays/qa/kustomization.yaml
          # Solo commitea si hay cambios reales
          git diff --cached --quiet || git commit -m "chore(qa): update frontend image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
          git push origin qa

      - name: Apply Kustomize overlays/qa
        run: |
          cd ${{ github.workspace }}
          kubectl apply -k infrastructure/k8s/overlays/qa \
            --context criptojackpot-qa \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Wait for rollout
        run: |
          echo "Waiting for cryptojackpot-app rollout..."
          kubectl rollout status deployment/cryptojackpot-app \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --context criptojackpot-qa \
            --timeout=300s || echo "WARNING: rollout timeout (non-blocking)"

      - name: Smoke test - Frontend healthcheck
        run: |
          sleep 10
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://qa.criptojackpot.com/ || echo "000")
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: Health check returned $HTTP_STATUS (may need time to propagate)"
          fi

      - name: Notify deploy success
        if: success()
        run: |
          echo "QA frontend deploy successful!"
          echo "  Commit: ${{ github.sha }}"
          echo "  Image tag: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "  URL: https://qa.criptojackpot.com"
