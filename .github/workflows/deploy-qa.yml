# =============================================================================
# Deploy QA (Frontend)
# Se ejecuta en: push a rama 'qa' (via PR desde develop)
# Hace:
#   1. Build + push de la imagen Docker del frontend al DOCR con tag qa-{sha}
#   2. terraform apply -var-file=environments/qa.tfvars
#      (crea/actualiza namespace + DNS)
#   3. ArgoCD Image Updater detecta la nueva imagen en DOCR (~1 min)
#   4. ArgoCD sincroniza automaticamente el deployment
# =============================================================================
# Flujo GitOps con Image Updater:
#   push a qa → build+push imagen → Image Updater detecta → ArgoCD sync
#   (sin commits automaticos, sin git pull forzado)
name: Deploy QA

on:
  push:
    branches: [qa]

concurrency:
  group: deploy-qa
  cancel-in-progress: false # Nunca cancelar un deploy en curso

env:
  NODE_VERSION: "22"
  ENVIRONMENT: qa
  REGISTRY: registry.digitalocean.com/criptojackpot
  TF_DIR: infrastructure/terraform
  K8S_NAMESPACE: criptojackpot
  NEXT_PUBLIC_API_BASE_URL: https://api-qa.criptojackpot.com

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push — construye y publica la imagen del frontend con tag :qa-{sha}
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=qa-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Building with tag: qa-${SHORT_SHA}"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/cryptojackpot-app:qa
            ${{ env.REGISTRY }}/cryptojackpot-app:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/cryptojackpot-app:qa
          cache-to: type=inline

  # ---------------------------------------------------------------------------
  # Terraform + Deploy — actualiza infra QA y despliega manifiestos K8s
  # ---------------------------------------------------------------------------
  terraform-deploy:
    name: Terraform Deploy QA
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: qa

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure AWS credentials for DO Spaces backend
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }}" >> $GITHUB_ENV

      - name: Terraform Init (QA state)
        run: |
          terraform init \
            -backend-config="key=frontend-qa/terraform.tfstate" \
            -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -var-file="environments/qa.tfvars" \
            -out=tfplan-qa \
            -input=false \
            -lock=true \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt
          PLAN_EXIT=$?
          echo "plan_exit_code=${PLAN_EXIT}" >> $GITHUB_OUTPUT

          # -detailed-exitcode: 0=no changes, 1=error, 2=changes present
          if [ "$PLAN_EXIT" -eq 1 ]; then
            echo "ERROR: Terraform plan fallo con errores."
            exit 1
          fi

          # Bloquear si el plan va a destruir recursos críticos
          if grep -E "must be replaced|will be destroyed|forces replacement" plan-output.txt | \
             grep -E "digitalocean_kubernetes_cluster|digitalocean_vpc|digitalocean_spaces_bucket"; then
            echo "ERROR: El plan destruiria recursos criticos de infraestructura."
            exit 1
          fi
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan-qa
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      # ArgoCD Image Updater detecta la nueva imagen en DOCR (~1 min en QA)
      # y actualiza el deployment automaticamente (sin commits a git).

      - name: Wait for Image Updater and verify deployment
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Imagen pushed con tag: ${TAG}"
          echo "ArgoCD Image Updater detectara el nuevo tag en ~1 minuto..."

          doctl kubernetes cluster kubeconfig save criptojackpot-qa-cluster 2>/dev/null || true

          for i in $(seq 1 20); do
            IMAGE=$(kubectl get deployment cryptojackpot-app -n criptojackpot -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "unknown")
            READY=$(kubectl get deployment cryptojackpot-app -n criptojackpot -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")

            echo "  [$i/20] Image: $IMAGE | Ready: $READY"

            if echo "$IMAGE" | grep -q "${TAG}"; then
              if [ "$READY" != "0" ]; then
                echo "Deployment verificado: frontend actualizado con el tag correcto."
                break
              fi
            fi

            if [ "$i" = "20" ]; then
              echo "ADVERTENCIA: Timeout esperando Image Updater. Verificar manualmente."
            fi
            sleep 10
          done
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DO_TOKEN }}
        continue-on-error: true

      - name: Notify deploy triggered
        if: success()
        run: |
          echo "QA frontend deploy triggered via ArgoCD GitOps!"
          echo "  Commit: ${{ github.sha }}"
          echo "  Image: ${{ env.REGISTRY }}/cryptojackpot-app:${{ needs.build-and-push.outputs.image_tag }}"
          echo "  ArgoCD sync pending for: https://qa.criptojackpot.com"
