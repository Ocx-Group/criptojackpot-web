# =============================================================================
# Deploy Production (Frontend)
# Se ejecuta en: push a rama 'main' (via PR desde qa)
# Hace:
#   1. Build + push de la imagen Docker del frontend con tag semver o prod-{sha}
#   2. terraform apply -var-file=environments/prod.tfvars
#      (crea/actualiza DNS Cloudflare)
#   3. ArgoCD Image Updater detecta la nueva imagen en DOCR (~2 min)
#   4. ArgoCD sincroniza automaticamente el deployment
#   5. Crea GitHub Release
# =============================================================================
# Flujo GitOps con Image Updater:
#   push a main → build+push imagen → Image Updater detecta → ArgoCD sync
#   (sin commits automaticos, sin git pull forzado)
name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false # NUNCA cancelar un deploy de prod en curso

env:
  NODE_VERSION: "22"
  ENVIRONMENT: prod
  REGISTRY: registry.digitalocean.com/criptojackpot
  TF_DIR: infrastructure/terraform
  K8S_NAMESPACE: criptojackpot
  NEXT_PUBLIC_API_BASE_URL: https://api.criptojackpot.com

jobs:
  # ---------------------------------------------------------------------------
  # Build & Push — construye y publica con tag :latest + :vX.Y.Z o :prod-{sha}
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Frontend Image (Production)
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para obtener tags git

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # Usar tag semver si existe en el commit actual (git tag apuntando al HEAD)
          GIT_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
          if [ -n "$GIT_TAG" ]; then
            TAG="${GIT_TAG}"
            VERSION="${GIT_TAG}"
          else
            TAG="prod-${SHORT_SHA}"
            VERSION="prod-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building production with tag: ${TAG}"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/cryptojackpot-app:latest
            ${{ env.REGISTRY }}/cryptojackpot-app:${{ steps.meta.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/cryptojackpot-app:latest
          cache-to: type=inline

  # ---------------------------------------------------------------------------
  # Terraform + Deploy — actualiza infra Prod
  # ---------------------------------------------------------------------------
  terraform-deploy:
    name: Terraform Deploy Production
    runs-on: ubuntu-latest
    needs: build-and-push
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure credentials for DO Spaces and CLI
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.DO_SPACES_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.DO_SPACES_SECRET_KEY }}" >> $GITHUB_ENV
          echo "DIGITALOCEAN_ACCESS_TOKEN=${{ secrets.DO_TOKEN }}" >> $GITHUB_ENV

      - name: Terraform Init (Prod state)
        run: |
          terraform init \
            -backend-config="key=frontend-prod/terraform.tfstate" \
            -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/prod.tfvars" \
            -out=tfplan-prod \
            -input=false \
            -lock=true \
            -detailed-exitcode \
            2>&1 | tee plan-output.txt

          # Bloquear si el plan va a destruir recursos criticos de produccion
          if grep -E "must be replaced|will be destroyed|forces replacement" plan-output.txt | \
             grep -E "digitalocean_kubernetes_cluster|digitalocean_vpc|digitalocean_spaces_bucket"; then
            echo "BLOQUEADO: El plan destruiria recursos criticos de PRODUCCION."
            echo "   Revisa el plan manualmente antes de aplicar."
            exit 1
          fi
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        continue-on-error: true

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan-prod
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      # ArgoCD Image Updater detecta la nueva imagen en DOCR (~2 min)
      # y actualiza el deployment automaticamente (sin commits a git).

      - name: Wait for Image Updater and verify deployment
        run: |
          TAG="${{ needs.build-and-push.outputs.image_tag }}"
          echo "Imagen pushed con tag: ${TAG}"
          echo "ArgoCD Image Updater detectara el nuevo tag en ~2 minutos..."

          doctl kubernetes cluster kubeconfig save criptojackpot-prod-cluster 2>/dev/null || true

          for i in $(seq 1 30); do
            IMAGE=$(kubectl get deployment cryptojackpot-app -n criptojackpot -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "unknown")
            READY=$(kubectl get deployment cryptojackpot-app -n criptojackpot -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            DESIRED=$(kubectl get deployment cryptojackpot-app -n criptojackpot -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "2")

            echo "  [$i/30] Ready: $READY/$DESIRED | Image: $IMAGE"

            if echo "$IMAGE" | grep -q "${TAG}"; then
              if [ "$READY" = "$DESIRED" ] && [ "$READY" != "0" ]; then
                echo "Deployment verificado: todas las replicas running con la imagen correcta."
                break
              fi
            fi

            if [ "$i" = "30" ]; then
              echo "ADVERTENCIA: Timeout esperando Image Updater. Verificar manualmente."
              echo "  kubectl logs -n argocd -l app.kubernetes.io/name=argocd-image-updater --tail=20"
            fi
            sleep 10
          done

          HTTP_CODE=$(curl -sk --connect-timeout 10 -o /dev/null -w '%{http_code}' https://criptojackpot.com || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Sitio verificado: https://criptojackpot.com responde HTTP 200"
          else
            echo "ADVERTENCIA: El sitio respondio HTTP $HTTP_CODE. Verificar manualmente."
          fi
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DO_TOKEN }}
        continue-on-error: true

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: "Frontend Release ${{ needs.build-and-push.outputs.version }}"
          body: |
            ## Deploy Frontend Production — ${{ needs.build-and-push.outputs.version }}

            **Commit:** ${{ github.sha }}
            **Deployed at:** ${{ github.event.head_commit.timestamp }}
            **Deployed by:** ${{ github.actor }}

            ### Image
            - `cryptojackpot-app:${{ needs.build-and-push.outputs.image_tag }}`

            ### URLs
            - Frontend: https://criptojackpot.com
            - API: https://api.criptojackpot.com
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deploy triggered
        if: success()
        run: |
          echo "Production frontend deploy triggered via ArgoCD GitOps!"
          echo "  Version: ${{ needs.build-and-push.outputs.version }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Image: ${{ env.REGISTRY }}/cryptojackpot-app:${{ needs.build-and-push.outputs.image_tag }}"
          echo "  ArgoCD sync pending for: https://criptojackpot.com"
