apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: criptojackpot

resources:
  - ../../base
  - secrets

patches:
  - target:
      kind: Deployment
      name: cryptojackpot-app
    patch: |-
      - op: add
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "256Mi"
            cpu: "150m"
          limits:
            memory: "512Mi"
            cpu: "500m"
  # imagePullSecrets para DOCR privado
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: registry-criptojackpot
  # Ingress - TLS gestionado por Cloudflare (sin cert-manager)
  # Flujo: Browser → Cloudflare (TLS terminado) → Ingress (HTTP interno)
  # Rate limiting como capa extra de defensa junto con Cloudflare WAF
  - target:
      kind: Ingress
      name: cryptojackpot-web-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1use-forwarded-headers
        value: "true"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1forwarded-for-header
        value: "CF-Connecting-IP"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1limit-rps
        value: "100"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1limit-connections
        value: "50"
      - op: replace
        path: /spec/rules
        value:
          - host: criptojackpot.com
            http:
              paths:
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /lottery-hub
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /health
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: cryptojackpot-app
                      port:
                        number: 80
          - host: www.criptojackpot.com
            http:
              paths:
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /lottery-hub
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /health
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: cryptojackpot-app
                      port:
                        number: 80

configMapGenerator:
  - name: web-config
    literals:
      - NEXT_PUBLIC_API_BASE_URL=https://api.criptojackpot.com
      - NEXT_PUBLIC_APP_ENV=prod

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: cryptojackpot/cryptojackpot-app
    newName: registry.digitalocean.com/criptojackpot/cryptojackpot-app
    newTag: prod-423bd33

labels:
  - pairs:
      environment: prod
    includeSelectors: false
