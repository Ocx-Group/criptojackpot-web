apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: criptojackpot

resources:
  - ../../base
  - secrets

patches:
  - target:
      kind: Deployment
      name: cryptojackpot-app
    patch: |-
      - op: add
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
  # imagePullSecrets para DOCR privado
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: regcred
  # Ingress - TLS gestionado por Cloudflare (sin cert-manager)
  # Flujo: Browser → Cloudflare (TLS terminado) → Ingress (HTTP interno)
  - target:
      kind: Ingress
      name: cryptojackpot-web-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1use-forwarded-headers
        value: "true"
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1forwarded-for-header
        value: "CF-Connecting-IP"
      - op: replace
        path: /spec/rules
        value:
          - host: qa.criptojackpot.com
            http:
              paths:
                - path: /api
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /lottery-hub
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /health
                  pathType: Prefix
                  backend:
                    service:
                      name: bff-gateway
                      port:
                        number: 80
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: cryptojackpot-app
                      port:
                        number: 80

configMapGenerator:
  - name: app-config
    literals:
      - NEXT_PUBLIC_API_BASE_URL=https://api-qa.criptojackpot.com
      - NEXT_PUBLIC_APP_ENV=qa

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: cryptojackpot/cryptojackpot-app
    newName: registry.digitalocean.com/criptojackpot/cryptojackpot-app
    newTag: qa

labels:
  - pairs:
      environment: qa
    includeSelectors: false
