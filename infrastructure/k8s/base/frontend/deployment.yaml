apiVersion: apps/v1
kind: Deployment
metadata:
  name: cryptojackpot-app
  namespace: criptojackpot
  labels:
    app: cryptojackpot-app
    component: frontend
spec:
  selector:
    matchLabels:
      app: cryptojackpot-app
  template:
    metadata:
      labels:
        app: cryptojackpot-app
        component: frontend
    spec:
      containers:
        - name: cryptojackpot-app
          image: cryptojackpot/cryptojackpot-app
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: NEXT_PUBLIC_API_BASE_URL
            - name: NEXT_PUBLIC_APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: web-config
                  key: NEXT_PUBLIC_APP_ENV
            - name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
                  optional: true
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
